engine:
  mode: backtest          # backtest | paper | live
  initial_capital: 100000
  commission: 0.001       # 0.1% per trade
  slippage: 0.0005        # 0.05% slippage model

risk:
  max_position_pct: 0.1   # max 10% of capital per position
  max_drawdown_pct: 0.2   # stop trading at 20% drawdown
  max_open_positions: 10
  stop_loss_pct: 0.05     # 5% stop loss per trade
  take_profit_pct: 0.15   # 15% take profit per trade

data:
  source: csv             # csv | yahoo | binance
  symbol: AAPL
  interval: 1d            # 1m, 5m, 15m, 1h, 1d
  start_date: "2020-01-01"
  end_date: "2025-12-31"

logging:
  level: INFO
  file: logs/quantflow.log
